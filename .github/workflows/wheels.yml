name: Build Wheels

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'


      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel meson ninja

      - name: Build wheels
        run: |
          cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_SKIP: "*-musllinux_*"
          # This forces cibuildwheel to switch from win32 to 64-bit windows
          CIBW_ARCHS_WINDOWS: AMD64
          # Force cibuildwheel to build using the MinGW GCC compiler system
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: delvewheel repair --add-path C:\msys64\mingw64\bin -w {dest_dir} {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish_to_pypi:
    name: Publish package to PyPI
    needs: build_wheels
    # Only upload to PyPI when a version tag is pushed, to prevent duplicate release errors on every main branch merge
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1